<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm - Shopee</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; display: flex; gap: 30px; }
        .product-image { width: 400px; height: 400px; object-fit: cover; border-radius: 4px; }
        .product-info { flex: 1; }
        .name { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .price { color: #ee4d2d; font-size: 30px; font-weight: bold; margin-bottom: 20px; }
        .desc-title { font-weight: bold; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
        .desc-content { color: #555; line-height: 1.6; margin-top: 10px; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #ee4d2d; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">&larr; Quay lại trang chủ</a>
    
    <div class="container">
        <img id="p-image" src="" class="product-image">
        <div class="product-info">
            <div id="p-name" class="name"></div>
            <div id="p-price" class="price"></div>
            <div class="desc-title">CHI TIẾT SẢN PHẨM</div>
            <div id="p-desc" class="desc-content"></div>
            
            <button onclick="addToCartDetail()" style="margin-top: 30px; background: #ee4d2d; color: white; border: none; padding: 15px 30px; cursor: pointer; border-radius: 4px; font-weight: bold;">
    THÊM VÀO GIỎ HÀNG
</button>
        </div>
    </div>

   <script>
   
    const params = new URLSearchParams(window.location.search);
    const pName = params.get('name');
    
    document.getElementById('p-name').innerText = pName;
    document.getElementById('p-price').innerText = "₫ " + parseInt(params.get('price')).toLocaleString();
    document.getElementById('p-image').src = params.get('img');
    document.getElementById('p-desc').innerText = params.get('desc');

    // 2. Hàm xử lý giỏ hàng
    function addToCartDetail() {
        // Lấy giỏ hàng hiện tại từ bộ nhớ trình duyệt (LocalStorage)
        // Nếu chưa có thì tạo giỏ hàng trống {}
        let cart = JSON.parse(localStorage.getItem('myCart')) || {};

        // Cộng dồn sản phẩm
        cart[pName] = (cart[pName] || 0) + 1;

        // Lưu lại vào bộ nhớ trình duyệt
        localStorage.setItem('myCart', JSON.stringify(cart));

        alert("Đã thêm " + pName + " vào giỏ hàng thành công!");
    }
</script>
</body>
</html>
