<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Shopee của Nam - Mua Sắm</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
        header { background: #ee4d2d; padding: 15px; text-align: center; color: white; position: sticky; top: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; border: 1px solid #ddd; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .price { color: #ee4d2d; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        
    <header style="display: flex; align-items: center; padding: 15px; background: #ee4d2d; color: white;">
        <a href="home.html" style="color: white; text-decoration: none; font-size: 24px; margin-right: 20px;">&larr;</a>
        <h2 style="margin: 0; flex-grow: 1;">SHOPEE CLONE</h2>
        <div id="cart-info" style="font-weight: bold; background: white; color: #ee4d2d; padding: 5px 10px; border-radius: 20px;">
            Giỏ hàng: 0
        </div>
    </header>
    <div class="grid" id="list"></div>

<script>
    let cart = {}; 

    async function load() {
        const res = await fetch('/api/products');
        const products = await res.json();
        
        let html = '';
        products.forEach(p => {
            const safeDesc = p.description ? encodeURIComponent(p.description) : "";
            const detailUrl = `detail.html?name=${encodeURIComponent(p.name)}&price=${p.price}&img=${encodeURIComponent(p.image)}&desc=${safeDesc}`;

            html += `
                <div class="card">
                    <a href="${detailUrl}" style="text-decoration: none; color: inherit;">
                        <img src="${p.image}">
                        <div style="font-size: 14px; margin-top: 5px; font-weight: bold; color: #333;">${p.name}</div>
                    </a>
                    <div class="price">₫ ${p.price.toLocaleString()}</div>
                    <button onclick="addToCart('${p.name}')" style="margin-top: 10px; background: #ee4d2d; color: white; border: none; padding: 8px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold;">
                        Thêm vào giỏ hàng
                    </button>
                </div>
            `;
        });
        document.getElementById('list').innerHTML = html;
    }

    // ĐÂY LÀ HÀM ĐÃ ĐƯỢC SỬA ĐỂ BÁO VỀ JAVA
    async function addToCart(name) {
        // 1. Cập nhật giao diện người mua (hiện x1, x2)
        cart[name] = (cart[name] || 0) + 1;
        updateCartDisplay();

        // 2. Gửi tín hiệu về Backend Java (Dòng này lúc nãy bạn thiếu nè)
        try {
            await fetch('/api/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            console.log("Đã báo về Java món: " + name);
        } catch (error) {
            console.error("Không báo được về Java:", error);
        }
    }

    function updateCartDisplay() {
        let totalItems = 0;
        let details = "GIỎ HÀNG CỦA BẠN:\n------------------\n";
        for (let name in cart) {
            totalItems += cart[name];
            details += `- ${name} (x${cart[name]})\n`;
        }
        document.getElementById('cart-info').innerText = "Giỏ hàng: " + totalItems;
        document.getElementById('cart-info').onclick = () => alert(details);
    }

    load();
</script>
</body>
</html>
